<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Холбоо барих — Гэрээ Групп</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23b06321'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3EX%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-hero">
  <div class="wrap">
    <div class="crumb">
      <a href="index.html">Нүүр</a><span>/</span>
      <b style="color:#fff;font-weight:500">Холбоо барих</b>
    </div>
    <h1>Холбоо барих</h1>
    <p>Бидэнтэй холбогдох, санал хүсэлтээ илгээх.</p>
  </div>
</div>

<div class="page-body">
  <div class="wrap">
    <div class="contact-grid">

      <div class="cinfo">
        <div class="ci">
          <div class="l">Хаяг</div>
          <div class="v">Улаанбаатар хот,<br>Сүхбаатар дүүрэг, Гэрээ оффис</div>
        </div>
        <div class="ci">
          <div class="l">Утас</div>
          <div class="v">+976 7000 0000</div>
        </div>
        <div class="ci">
          <div class="l">И-мэйл</div>
          <div class="v">info@geree.mn</div>
        </div>
        <div class="ci">
          <div class="l">Цаг</div>
          <div class="v">Даваа–Баасан, 09:00–18:00</div>
        </div>
      </div>

      <div>
        <div class="form-ok" id="formOk">Таны санал, хүсэлтийг хүлээн авлаа. Баярлалаа.</div>
        <div class="form-err" id="formErr"></div>
        <div class="cform">
          <div><label>Нэр</label><input id="f-name" placeholder="Таны нэр"></div>
          <div><label>И-мэйл</label><input id="f-email" placeholder="email@жишээ.mn"></div>
          <div class="full"><label>Сэдэв</label><input id="f-subj" placeholder="Сэдэв"></div>
          <div class="full"><label>Зурвас</label><textarea id="f-msg" placeholder="Санал, хүсэлтээ бичнэ үү..."></textarea></div>
          <div class="full"><button id="f-send">Илгээх</button></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
initAll();
initContactForm();
</script>
</body>
</html>
