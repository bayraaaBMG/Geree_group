<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Компани — Хүдэр Групп</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23b06321'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3EX%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Hero + body rendered by JS -->
<div id="pageHero"></div>
<div id="pageBody"></div>

<script src="js/shared.js"></script>
<script>
initAll();

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'), 10);
const s = (id >= 0 && id < subs.length) ? subs[id] : null;

if (!s) {
  document.getElementById('pageHero').innerHTML = `
    <div class="page-hero"><div class="wrap">
      <div class="crumb"><a href="index.html">Нүүр</a><span>/</span><a href="business.html">Бизнесийн салбар</a></div>
      <h1>Олдсонгүй</h1>
    </div></div>`;
} else {
  document.title = s.name + ' — Хүдэр Групп';

  document.getElementById('pageHero').innerHTML = `
    <div class="page-hero"><div class="wrap">
      <div class="crumb">
        <a href="index.html">Нүүр</a><span>/</span>
        <a href="business.html">Бизнесийн салбар</a><span>/</span>
        <b style="color:#fff;font-weight:500">${s.name}</b>
      </div>
      <h1>${s.name}</h1>
      <p>${s.sec} · ${s.loc}</p>
    </div></div>`;

  document.getElementById('pageBody').innerHTML = `
    <div class="page-body"><div class="wrap">
      <div class="prose" style="margin-bottom:34px">
        <p style="font-size:18px;color:var(--ink)">${s.long}</p>
      </div>
      <div class="grid3" style="margin-bottom:40px">
        <div class="card"><div class="vnum">${s.y}</div><h4>Байгуулсан он</h4></div>
        <div class="card"><div class="vnum">${s.emp}</div><h4>Ажилтан</h4></div>
        <div class="card"><div class="vnum" style="font-size:24px;padding-top:6px">${s.loc}</div><h4>Байршил</h4></div>
      </div>
      <h3 style="text-transform:uppercase;letter-spacing:.6px;font-size:22px;margin-bottom:8px">
        <span class="barx"></span>Үндсэн чиглэл
      </h3>
      <ul class="prod" style="max-width:820px">
        ${s.prod.map(p => `<li><div class="pt">${p.t}</div><div class="pd">${p.d}</div></li>`).join('')}
      </ul>
      <div style="margin-top:36px">
        <a class="seeall" href="business.html">← Бүх компани руу буцах</a>
      </div>
    </div></div>`;
}
</script>
</body>
</html>
