<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мэдээ — Гэрээ Групп</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23b06321'/%3E%3Ctext x='16' y='23' font-family='Arial' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3EX%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Golos+Text:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-hero">
  <div class="wrap">
    <div class="crumb">
      <a href="index.html">Нүүр</a><span>/</span>
      <b style="color:#fff;font-weight:500">Мэдээ</b>
    </div>
    <h1>Мэдээ</h1>
    <p>Группын сүүлийн үеийн мэдээ, мэдээлэл.</p>
  </div>
</div>

<div class="page-body">
  <div class="wrap">
    <div class="news-grid" id="newsGrid"></div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
initAll();
document.getElementById('newsGrid').innerHTML = news.map((n,i) =>
  `<div class="ncard" data-news="${i}">
    <div class="nimg">
      <div class="ph"><svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#c3b8a4" stroke-width="1.4"><path d="M3 14l4-7 5 3 4-4 5 5v8H3z"/></svg></div>
      <span class="date">${n.d}</span>
    </div>
    <div class="nbody"><h4>${n.t}</h4><p>${n.p}</p><span class="read">Дэлгэрэнгүй →</span></div>
  </div>`
).join('');
</script>
</body>
</html>
